{
  base_dir:    "~/src/cw_proj/demo_202602/io",
  io_dict:     "~/src/cw_proj/demo_202602/io.cfg"                 // Runtime configuration file.
  proc_dict:   "~/src/caw/src/libcw/src/flow/rsrc/proc_dict.cfg", // Processor class definition file.
  udp_dict:    "~/src/caw/src/libcw/src/flow/rsrc/udp_dict.cfg",  // User defined proc files
  tracer: {  trace_cnt:1024, msg_cnt: 1024000, enable_fl:false, activate_fl:false, out_fname:"tracer" }
  log: { flags:[ date_time, file_out, console, overwrite_file ], level:info, log_filename:"~/temp/caw_log.txt", queue_blk_cnt:16, queue_blk_byte_cnt:4096 }


  programs: {

     pgm_00_sine: {

       network: {

         procs: {
           lfo:   { class: sine_tone, args:{ hz:3, dc:440, gain:110 }}
           sh:    { class: sample_hold,            in:{ in:lfo.out } }
           osc:   { class: sine_tone, preset:mono, in:{ hz:sh.out } },
	   aout:  { class:audio_out,               in:{ in:osc.out }, args:{ dev_label:"main"} }
        }
      }
    }

    pgm_01_ctl: {
    
      print_network_fl: false
      
      network: {

        procs: {


	  mp: { class: multi_player, 
	                             args:{ cfg_fname:"~/src/cw_proj/demo_202602/py/multi_player.cfg" },
	  			     ui:{ create_fl:false } },
	  
	  sf: { class:score_follower_2, in: { in:mp.out },
	                                args: { score_fname:"~/src/cw_proj/demo_202602/py/score_demo_20260217.csv"},
	  		          ui: { create_fl:false } },



	  ctl: { class: demo_202602_ctl, in: { sf_loc:sf.out }, 
	                                 args:{ cfg_fname:"~/src/cw_proj/demo_202602/py/pgm_ctl.cfg" },
	                                 out: {
					   start: mp.start,
					 
					   sf_beg_loc:  sf.b_loc,
					   sf_end_loc:  sf.e_loc,
					   sf_reset_fl: sf.reset_trigger,
					   
					   // mp_start_play_id: mp.start_seg_id,
					   // mp_play_id:  mp.play_id,
					   mp_reset_fl: mp.reset,
					   mp_clear_fl: mp.clear					   
					 },
					 ui: { create_fl:true
					   vars: {
					     gutim_01_plyr_id: { title:"1 m:1  5919 Nic" }
					     gutim_02_plyr_id: { title:"2 m:6  5928 Han" }
					     gutim_03_plyr_id: { title:"3 m:13  5936 Ars" }
					     gutim_04_plyr_id: { title:"5 m:24  5970 Nic" }
					     gutim_05_plyr_id: { title:"7 m:33  5976 Han" }
					     gutim_06_plyr_id: { title:"8 m:38  5946 Ars" }
					     gutim_07_plyr_id: { title:"9 m:43  5960 Han" }
					     gutim_08_plyr_id: { title:"10 m:51  5961 Nic" }
					     gutim_09_plyr_id: { title:"13 m:68  5980 Ars" }
					     gutim_10_plyr_id: { title:"16 m:84  5992 Nic" }
					     gutim_11_plyr_id: { title:"18 m:91  6004 Ars" }
					     gutim_12_plyr_id: { title:"19 m:100 6008 Han" }
					     gutim_13_plyr_id: { title:"22 m:106 6012 Nic" }
					     gutim_14_plyr_id: { title:"24 m:116 6042 Ars" }
					     gutim_15_plyr_id: { title:"25 m:118 6044 Han" }
					     gutim_16_plyr_id: { title:"28 m:123 6070 Nic" }
					     gutim_17_plyr_id: { title:"29 m:129 6072 Han" }
					     gutim_18_plyr_id: { title:"31 m:136 6076 Ars" }					   }
					 }
				}


          // Defer starting the spirio segment by waiting for particular key/pedal releases
	  end_detect: { class:end_seg_detector, in: { seg_id_in:ctl.cur_seg_idx,
	                                              play_id_in:ctl.mp_play_id,
	                                              reset:ctl.reset,
	                                              midi_in:sf.out },						      
					        out: { play_id_out:mp.play_id },						
	                                        args: { cfg_fname:"$/end_seg_detect.cfg" }
						ui:   { create_fl:false } }


						
    	  samp_vt:{ class: vel_table, in:{ in:sf.out }, args:{ vel_tbl_fname:"$/vel_table_perf.json", vel_tbl_label:"ivory" }},

          vctl:  { class: poly_voice_ctl,  in:{ in:samp_vt.out , reset:ctl.reset},  args:{ voice_cnt:40, prune_thresh:20 } },

	  voice_poly: {
	    class: poly,
	    in:   { count:vctl.voice_cnt },		  
	    args: { parallel_fl:false, thread_cnt:8, cpu_affinityL:[2,3,4,6,8,9,10,11] },

	    network: {
	      procs: {
	        voc: { class:piano_voice, in:{ _.in:_.vctl.out_, _.reset:_.ctl.reset },
		                          out:{ _.done_fl:_.vctl.done_fl_ },
					  args:{ wtb_fname:"~/media/audio/wt6/wt_bank.json",
					         wtb_instr:"piano",
						 rls_coeff: 0.99 } },
						 
	      }

	    }
	  }


	  poly_mix: { class: audio_mix,   in:{ in_:voice_poly.voc_.out}    args:{ igain_:0.5 }},

	  sync_delay: { class: audio_delay, in: { in:poly_mix.out }, args:{ delayMs:400 }}
	  
          aout:  { class: audio_out,     in:{ in:sync_delay.out }, args:{ dev_label:"main" } },


	  piano_vt: { class: vel_table, in:{ in:sf.out }, args:{ vel_tbl_fname:"$/vel_table_perf.json", vel_tbl_label:"spirio_1" }},

	  mout: { class:midi_out,  in:{ rin:piano_vt.out }, args:{ print_fl:false, dev_label:"MIDIFACE 2x2", port_label:"MIDIFACE 2x2 Midi Out 1"} },

	}
      }
    } // pgm_01_ctl

    pgm_02_xform: {
    
      print_network_fl: false
      
      network: {

        procs: {


	  mp: { class: multi_player, 
	                             args:{ cfg_fname:"~/src/cw_proj/demo_202602/py/multi_player.cfg" },
	  			     ui:{ create_fl:false } },
	  
	  sf: { class:score_follower_2, in: { in:mp.out },
	                                args: { score_fname:"~/src/cw_proj/demo_202602/py/score_demo_20260217.csv"
					        print_fl:false },
	  		                ui: { create_fl:false } },



	  ctl: { class: demo_202602_ctl, in: { sf_loc:sf.out }, 
	                                 args:{ cfg_fname:"~/src/cw_proj/demo_202602/py/pgm_ctl.cfg" },
	                                 out: {
					   start: mp.start,
					 
					   sf_beg_loc:  sf.b_loc,
					   sf_end_loc:  sf.e_loc,
					   sf_reset_fl: sf.reset_trigger,
					   
					   // mp_start_play_id: mp.start_seg_id,
					   // mp_play_id:  mp.play_id,
					   mp_reset_fl: mp.reset,
					   mp_clear_fl: mp.clear					   
					 },
					 log: {
					   varL:[sf_beg_loc,sf_end_loc]
					 },
					 ui: { create_fl:true
					   vars: {
					     gutim_01_plyr_id: { title:"1 m:1  5919 Nic" }
					     gutim_02_plyr_id: { title:"2 m:6  5928 Han" }
					     gutim_03_plyr_id: { title:"3 m:13  5936 Ars" }
					     gutim_04_plyr_id: { title:"5 m:24  5970 Nic" }
					     gutim_05_plyr_id: { title:"7 m:33  5976 Han" }
					     gutim_06_plyr_id: { title:"8 m:38  5946 Ars" }
					     gutim_07_plyr_id: { title:"9 m:43  5960 Han" }
					     gutim_08_plyr_id: { title:"10 m:51  5961 Nic" }
					     gutim_09_plyr_id: { title:"13 m:68  5980 Ars" }
					     gutim_10_plyr_id: { title:"16 m:84  5992 Nic" }
					     gutim_11_plyr_id: { title:"18 m:91  6004 Ars" }
					     gutim_12_plyr_id: { title:"19 m:100 6008 Han" }
					     gutim_13_plyr_id: { title:"22 m:106 6012 Nic" }
					     gutim_14_plyr_id: { title:"24 m:116 6042 Ars" }
					     gutim_15_plyr_id: { title:"25 m:118 6044 Han" }
					     gutim_16_plyr_id: { title:"28 m:123 6070 Nic" }
					     gutim_17_plyr_id: { title:"29 m:129 6072 Han" }
					     gutim_18_plyr_id: { title:"31 m:136 6076 Ars" }					   }
					 }
				}


          // Defer starting the spirio segment by waiting for particular key/pedal releases
	  end_detect: { class:end_seg_detector, in: { seg_id_in:ctl.cur_seg_idx,
	                                              play_id_in:ctl.mp_play_id,
	                                              reset:ctl.reset,
	                                              midi_in:sf.out },						      
					        out: { play_id_out:mp.play_id },						
	                                        args: { cfg_fname:"$/end_seg_detect.cfg" }
						ui:   { create_fl:false } }

          // Route Scriabin segments around the sampler velocity table. 1 in 3 out
	  vel_rt: { class:recd_route, in:{ in:sf.out }, args:{ out_cnt:2, sel_field:"mp_port_id" }  },

    	  samp_vt:{ class: vel_table, in:{ in:vel_rt.out0 }, args:{ vel_tbl_fname:"$/vel_table_perf.json", vel_tbl_label:"ivory" }},

	  // Extract only the MIDI msg part of the MIDI msg to make the record formats the same for both MIDI streams.
	  // This is a requirement to merge the streams in recd_merge.
	  ex_midi_a: { class:recd_extract, in:{ in:vel_rt.out1 }, args:{ out_fmt:{ alloc_cnt:1024, fields:{ midi:{type:m3, doc:"MIDI msg"} } } } }
	  ex_midi_b: { class:recd_extract, in:{ in:samp_vt.out }, args:{ out_fmt:{ alloc_cnt:1024, fields:{ midi:{type:m3, doc:"MIDI msg"} } } } }
	  
	  vctl_merge: { class: recd_merge, in:{ in0:ex_midi_a.out, in1:ex_midi_b.out } }

          vctl:  { class: poly_voice_ctl,  in:{ in:vctl_merge.out , reset:ctl.reset},  args:{ voice_cnt:20, prune_thresh:10 } },

	  ps:    { class: gutim_ps, preset:init, in:{ in:sf.out, midi_in_:vctl.out_, reset:ctl.reset, loc_cnt:sf.loc_cnt   },
	                                         preset: "init",
	                                         args:{ fname:"~/src/cw_proj/demo_202602/py/demo_xforms.txt" },
						 ui:  { create_fl:true } },

	  xform_igain:  { class: number,   args:{ in:1.0f },  ui: { create_fl:true } },


	  voice_poly: {
	    class: poly,
	    in:   { count:vctl.voice_cnt },		  
	    args: { parallel_fl:false, thread_cnt:8, cpu_affinityL:[2,3,4,6,8,9,10,11] },

	    network: {
	      procs: {
	        voc: { class:piano_voice, in:{ _.in:_.vctl.out_, _.reset:_.ctl.reset },
		                          out:{ _.done_fl:_.vctl.done_fl_ },
					  args:{ wtb_fname:"~/media/audio/wt6/wt_bank.json",
					         wtb_instr:"piano",
						 rls_coeff: 0.99 } },

		g:     { class: audio_gain,       in:{ in:voc.out, gain:_.xform_igain.out }  },
	        pva:   { class: pv_analysis,      in:{ in:g.out, enable:voc.gate_fl, _.wndSmpN:_.ps.wnd_smp_cnt_ },
		                                  args:{ wndSmpN:512, hopSmpN:128, hzFl:false  } },
						  
	        sd:    { class: spec_dist,        in:{ in:pva.out,
		                                       enable:voc.gate_fl,
		                                       _.ceiling:_.ps.ceiling_,
						       _.expo:_.ps.expo_,
						       _.thresh:_.ps.thresh_,
						       _.upr:_.ps.upr_,
						       _.lwr:_.ps.lwr_,
						       _.mix:_.ps.mix_ },  preset:kc, args:{ bypass:false }   },
		
                pvs:   { class: pv_synthesis,     in:{ in:sd.out, enable:voc.gate_fl  } },
	        cmp:   { class: compressor,       in:{ in:pvs.out,
		                                       enable:voc.gate_fl,
		                                       _.igain:_.ps.c_igain_,
						       _.ogain:_.ps.c_ogain_ }, preset:kc, args:{ bypass:false }   },
						       
		ogain: { class: audio_gain,       in:{ in:cmp.out, _.gain:_.ps.dry_gain_ } },

						 
	      }

	    }
	  }


          // mix polyphonic signals down to stereo
	  wet_poly_mix: { class: audio_mix,   in:{ in_:voice_poly.ogain_.out } args:{ igain_:1.0 }},
	  dry_poly_mix: { class: audio_mix,   in:{ in_:voice_poly.voc_.out}    args:{ igain_:1.0 }},

	  // apply the wet/dry gain balance
	  wd_bal:       { class: balance, args:{}},
	  wet_bal_gain: { class: audio_gain, in:{ in:wet_poly_mix.out, gain:wd_bal.out }     },
	  dry_bal_gain: { class: audio_gain, in:{ in:dry_poly_mix.out, gain:wd_bal.inv_out } },

          // apply gain to wet/dry individually
	  mstr_wet_out: { class: audio_gain, in:{ in:wet_bal_gain.out }, args:{ gain:0.25 } }
	  mstr_dry_out: { class: audio_gain, in:{ in:dry_bal_gain.out }, args:{ gain:0.25 } },
	   

	  // merge the wet/dry signals into a single 4 channel signal
	  //merge: { class: audio_merge,   in:{ in0:mstr_wet_out.out, in1:mstr_dry_out.out }  },
       
          mix: { class: audio_mix, in:{ in0:mstr_wet_out.out, in1:mstr_dry_out.out } },
	  
          aout:  { class: audio_out,     in:{ in:mix.out }, args:{ dev_label:"main" } },

	}
      }
    } // pgm_02_xform

    pgm_03_midi_xform: {
    
      print_network_fl: false
      
      network: {

        procs: {


	  mp: { class: multi_player, 
	                             args:{ cfg_fname:"~/src/cw_proj/demo_202602/py/multi_player.cfg" },
	  			     ui:{ create_fl:false } },


	  
	  sf: { class:score_follower_2, in: { in:mp.out },
	                                args: { score_fname:"~/src/cw_proj/demo_202602/py/score_demo_20260217.csv"
					        print_fl:false },
	  		                ui: { create_fl:false } },



	  ctl: { class: demo_202602_ctl, in: { sf_loc:sf.out }, 
	                                 args:{ cfg_fname:"~/src/cw_proj/demo_202602/py/pgm_ctl.cfg" },
	                                 out: {
					   start: mp.start,
					 
					   sf_beg_loc:  sf.b_loc,
					   sf_end_loc:  sf.e_loc,
					   sf_reset_fl: sf.reset_trigger,
					   
					   // mp_start_play_id: mp.start_seg_id,
					   // mp_play_id:  mp.play_id,
					   mp_reset_fl: mp.reset,
					   mp_clear_fl: mp.clear					   
					 },
					 log: {
					   //varL:[sf_beg_loc,sf_end_loc]
					 },
					 ui: { create_fl:true
					   vars: {
					     gutim_01_plyr_id: { title:"1 m:1  5919 Nic" }
					     gutim_02_plyr_id: { title:"2 m:6  5928 Han" }
					     gutim_03_plyr_id: { title:"3 m:13  5936 Ars" }
					     gutim_04_plyr_id: { title:"5 m:24  5970 Nic" }
					     gutim_05_plyr_id: { title:"7 m:33  5976 Han" }
					     gutim_06_plyr_id: { title:"8 m:38  5946 Ars" }
					     gutim_07_plyr_id: { title:"9 m:43  5960 Han" }
					     gutim_08_plyr_id: { title:"10 m:51  5961 Nic" }
					     gutim_09_plyr_id: { title:"13 m:68  5980 Ars" }
					     gutim_10_plyr_id: { title:"16 m:84  5992 Nic" }
					     gutim_11_plyr_id: { title:"18 m:91  6004 Ars" }
					     gutim_12_plyr_id: { title:"19 m:100 6008 Han" }
					     gutim_13_plyr_id: { title:"22 m:106 6012 Nic" }
					     gutim_14_plyr_id: { title:"24 m:116 6042 Ars" }
					     gutim_15_plyr_id: { title:"25 m:118 6044 Han" }
					     gutim_16_plyr_id: { title:"28 m:123 6070 Nic" }
					     gutim_17_plyr_id: { title:"29 m:129 6072 Han" }
					     gutim_18_plyr_id: { title:"31 m:136 6076 Ars" }					   }
					 }
				}


          // Defer starting the spirio segment by waiting for particular key/pedal releases
	  end_detect: { class:end_seg_detector, in: { seg_id_in:ctl.cur_seg_idx,
	                                              play_id_in:ctl.mp_play_id,
						      play_delay_ms:ctl.es_delay_ms,
	                                              reset:ctl.reset,
	                                              midi_in:sf.out },						      
					        out: { play_id_out:mp.play_id, play_id_out:ctl.es_play_id_in },						
	                                        args: { cfg_fname:"$/end_seg_detect.cfg" }
						ui:   { create_fl:false },
						log: { varL:[]} }

	  // Everything has been score followed and so everything must go through the sampler vel. table.
    	  samp_vt:{ class: vel_table, in:{ in:sf.out }, args:{ vel_tbl_fname:"$/vel_table_perf.json", vel_tbl_label:"ivory" }},

          vctl:  { class: poly_voice_ctl,  in:{ in:samp_vt.out , reset:ctl.reset},  args:{ voice_cnt:40, prune_thresh:20 } },

	  ps:    { class: gutim_ps, preset:init, in:{ in:sf.out,
	                                              midi_in_:vctl.out_,
						      reset:ctl.reset,
						      loc_cnt:sf.loc_cnt,
						      per_note_fl:ctl.xf_per_note_fl,
						      pri_prob_fl:ctl.xf_prob_fl,
						      pri_uniform_fl:ctl.xf_uni_fl,
						      pri_dry_on_play_fl:ctl.xf_dry_on_play_fl,
						      pri_allow_all_fl:ctl.xf_allow_all_fl,
						      pri_dry_on_sel_fl:ctl.xf_dry_on_sel_fl,
						      
						      },
	                                         preset: "init",
	                                         args:{ fname:"~/src/cw_proj/demo_202602/py/demo_xforms.txt" },
						 ui:  { create_fl:true } },

	  xform_igain:  { class: number,   args:{ in:1.0f },  ui: { create_fl:true } },


	  voice_poly: {
	    class: poly,
	    in:   { count:vctl.voice_cnt },		  
	    args: { parallel_fl:false, thread_cnt:8, cpu_affinityL:[2,3,4,6,8,9,10,11] },

	    network: {
	      procs: {
	        voc: { class:piano_voice, in:{ _.in:_.vctl.out_, _.reset:_.ctl.reset },
		                          out:{ _.done_fl:_.vctl.done_fl_ },
					  args:{
					         // wtb_fname:"~/media/audio/wt6/wt_bank.json",
						 wtb_fname:"~/temp/syn_wt/syn_wt_0.json",
					         wtb_instr:"piano",
						 rls_coeff: 0.99 } },

		g:     { class: audio_gain,       in:{ in:voc.out, gain:_.xform_igain.out }  },
	        pva:   { class: pv_analysis,      in:{ in:g.out, enable:voc.gate_fl, _.wndSmpN:_.ps.wnd_smp_cnt_ },
		                                  args:{ wndSmpN:512, hopSmpN:128, hzFl:false  } },
						  
	        sd:    { class: spec_dist,        in:{ in:pva.out,
		                                       enable:voc.gate_fl,
		                                       _.ceiling:_.ps.ceiling_,
						       _.expo:_.ps.expo_,
						       _.thresh:_.ps.thresh_,
						       _.upr:_.ps.upr_,
						       _.lwr:_.ps.lwr_,
						       _.mix:_.ps.mix_ },  preset:kc, args:{ bypass:false }   },
		
                pvs:   { class: pv_synthesis,     in:{ in:sd.out, enable:voc.gate_fl  } },
	        cmp:   { class: compressor,       in:{ in:pvs.out,
		                                       enable:voc.gate_fl,
		                                       _.igain:_.ps.c_igain_,
						       _.ogain:_.ps.c_ogain_ }, preset:kc, args:{ bypass:false }   },
						       
		ogain: { class: audio_gain,       in:{ in:cmp.out, _.gain:_.ps.dry_gain_ } },

						 
	      }

	    }
	  }


          // mix polyphonic signals down to stereo
	  wet_poly_mix: { class: audio_mix,   in:{ in_:voice_poly.ogain_.out } args:{ igain_:1.0 }},
	  dry_poly_mix: { class: audio_mix,   in:{ in_:voice_poly.voc_.out}    args:{ igain_:1.0 }},

	  // apply the wet/dry gain balance
	  wd_bal:       { class: balance, args:{}},
	  wet_bal_gain: { class: audio_gain, in:{ in:wet_poly_mix.out, gain:wd_bal.out }     },
	  dry_bal_gain: { class: audio_gain, in:{ in:dry_poly_mix.out, gain:wd_bal.inv_out } },

          // apply gain to wet/dry individually
	  mstr_wet_out: { class: audio_gain, in:{ in:wet_bal_gain.out }, args:{ gain:0.25 } }
	  //mstr_wet_out: { class: audio_gain, in:{ in:dry_bal_gain.out }, args:{ gain:0.25 } }	  
	  mstr_dry_out: { class: audio_gain, in:{ in:dry_bal_gain.out }, args:{ gain:0.25 } },
	   

	  // merge the wet/dry signals into a single 4 channel signal
	  merge: { class: audio_merge,   in:{ in0:mstr_wet_out.out, in1:mstr_dry_out.out }  },

	  sync_delay: { class: audio_delay, in: { in:merge.out }, args:{ delayMs:400 }}

          //mix: { class: audio_mix, in:{ in0:mstr_wet_out.out, in1:mstr_dry_out.out } },
	  
          aout:  { class: audio_out,     in:{ in:sync_delay.out }, args:{ dev_label:"main" } },



	  //
	  //  MIDI output to Spirio
	  //

          // Recorded=0, Score=1, Scriabin=2 
	  piano_rt: { class:recd_route, in:{ in:mp.out }, args:{ out_cnt:3, sel_field:"mp_port_id" }  },

          // Velocity map score derived messages.
	  piano_vt: { class: vel_table, in:{ in:piano_rt.out1 }, args:{ vel_tbl_fname:"$/vel_table_perf.json", vel_tbl_label:"spirio_1" }},

	  // Extract only the MIDI msg part of the MIDI msg to make the record formats the same for both MIDI streams.
	  // This is a requirement to merge the streams in recd_merge.
	  piano_ex_a: { class:recd_extract, in:{ in:piano_rt.out0 }, args:{ out_fmt:{ alloc_cnt:1024, fields:{ midi:{type:m3, doc:"MIDI msg"} } } } }
	  piano_ex_b: { class:recd_extract, in:{ in:piano_vt.out }, args:{ out_fmt:{ alloc_cnt:1024, fields:{ midi:{type:m3, doc:"MIDI msg"} } } } }
	  piano_ex_c: { class:recd_extract, in:{ in:piano_rt.out2 }, args:{ out_fmt:{ alloc_cnt:1024, fields:{ midi:{type:m3, doc:"MIDI msg"} } } } }
	  
	  piano_merge: { class: recd_merge, in:{ in0:piano_ex_a.out, in1:piano_ex_b.out, in2:piano_ex_c.out } }

	  mout: { class:midi_out,  in:{ rin:piano_merge.out }, args:{ print_fl:false, dev_label:"MIDIFACE 2x2", port_label:"MIDIFACE 2x2 Midi Out 1"} },


	}
      }
    } // pgm_03_midi_xform


  }  // programs 

}


